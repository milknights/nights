<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文章详情</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      min-height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.8;
      color: #2d3748;
    }

    /* 顶部操作栏：返回+编辑+删除 */
    .detail-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6671ff;
      text-decoration: none;
      font-size: 15px;
      padding: 8px 14px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: rgba(102, 113, 255, 0.1);
    }

    /* 编辑删除按钮组 */
    .detail-btn-group {
      display: flex;
      gap: 10px;
    }

    .detail-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-edit-detail {
      background: #48bb78;
      color: #fff;
    }

    .btn-edit-detail:hover {
      background: #38a169;
    }

    .btn-del-detail {
      background: #f56565;
      color: #fff;
    }

    .btn-del-detail:hover {
      background: #e53e3e;
    }

    /* 文章详情容器 */
    .article-detail {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 15px rgba(102, 113, 255, 0.08);
    }

    .article-title {
      font-size: 26px;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    /* 封面图 */
    .article-cover {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }

    /* 文章内容，渲染富文本样式 */
    .article-content {
      font-size: 16px;
      color: #4a5568;
      line-height: 1.9;
      margin-bottom: 25px;
    }

    /* 正文图片，展示在文字下方 */
    .article-content-img {
      width: 80%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 12px;
      margin: 20px auto;
      display: block;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }

    /* 无文章提示 */
    .empty-detail {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .article-detail {
        padding: 25px;
      }
      .article-title {
        font-size: 22px;
      }
      .article-content-img {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="detail-top-bar">
    <a href="index.html" class="back-btn">← 返回首页</a>
    <div class="detail-btn-group">
      <button class="detail-btn btn-edit-detail" id="editBtn">编辑文章</button>
      <button class="detail-btn btn-del-detail" id="delBtn">删除文章</button>
    </div>
  </div>
  <div id="detailContainer"></div>

  <script>
    // 获取文章ID
    const params = new URLSearchParams(location.search);
    const articleId = params.get('id');
    const articleList = JSON.parse(localStorage.getItem('articleList')) || [];
    const container = document.getElementById('detailContainer');
    const editBtn = document.getElementById('editBtn');
    const delBtn = document.getElementById('delBtn');

    // 渲染详情内容
    if (articleId !== null && articleList[articleId]) {
      const item = articleList[articleId];
      let contentHtml = `
        <div class="article-detail">
          <h1 class="article-title">${item.title}</h1>
          <img src="${item.cover}" class="article-cover" alt="文章封面">
          <div class="article-content">${item.content}</div>
      `;
      // 有正文图则展示在文字下方
      if(item.contentImg && item.contentImg !== '') {
        contentHtml += `<img src="${item.contentImg}" class="article-content-img" alt="文章正文图">`;
      }
      contentHtml += `</div>`;
      container.innerHTML = contentHtml;

      // 编辑按钮跳转首页编辑
      editBtn.onclick = function() {
        location.href = `index.html?edit=${articleId}`;
      };

      // 删除按钮
      delBtn.onclick = function() {
        if(!confirm('确定删除这篇文章吗？删除后无法恢复！')) return;
        articleList.splice(articleId, 1);
        localStorage.setItem('articleList', JSON.stringify(articleList));
        alert('文章删除成功！');
        location.href = 'index.html';
      };
    } else {
      container.innerHTML = '<div class="empty-detail">文章不存在或已删除～</div>';
      // 隐藏操作按钮
      document.querySelector('.detail-btn-group').style.display = 'none';
    }

    // 监听首页编辑跳转
    window.onload = function() {
      const editId = new URLSearchParams(location.search).get('edit');
      if(editId) {
        // 模拟触发首页编辑
        sessionStorage.setItem('editId', editId);
        location.href = 'index.html';
      }
    };
  </script>
</body>
</html>
