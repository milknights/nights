<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文章详情</title>
  <style>
    body {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: "Microsoft Yahei", sans-serif;
      line-height: 1.8;
    }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #409eff;
      text-decoration: none;
    }
    .article-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 8px;
      margin: 20px 0;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    .content {
      font-size: 15px;
      color: #555;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back">← 返回首页</a>
  <div id="detailContainer"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const blogs = JSON.parse(localStorage.getItem("blogs")) || [];
    const container = document.getElementById("detailContainer");

    if (id === null || !blogs[id]) {
      container.innerHTML = "<h2>文章不存在或已删除</h2>";
    } else {
      const item = blogs[id];
      container.innerHTML = `
        <h1>${item.title}</h1>
        <img src="${item.image}" class="article-img">
        <div class="content">${item.content}</div>
      `;
    }
  </script>
</body>
</html>
