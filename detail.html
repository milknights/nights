<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文章详情</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      min-height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.8;
      color: #2d3748;
    }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #6671ff;
      text-decoration: none;
      font-size: 15px;
      margin-bottom: 30px;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: rgba(102, 113, 255, 0.1);
    }

    /* 文章详情容器 */
    .article-detail {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 15px rgba(102, 113, 255, 0.08);
    }

    .article-title {
      font-size: 26px;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .article-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }

    .article-content {
      font-size: 16px;
      color: #4a5568;
      white-space: pre-line;
      line-height: 1.9;
    }

    /* 无文章提示 */
    .empty-detail {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .article-detail {
        padding: 25px;
      }
      .article-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← 返回首页</a>
  <div id="detailContainer"></div>

  <script>
    // 获取文章ID
    const params = new URLSearchParams(location.search);
    const articleId = params.get('id');
    const articleList = JSON.parse(localStorage.getItem('articleList')) || [];
    const container = document.getElementById('detailContainer');

    if (articleId !== null && articleList[articleId]) {
      const item = articleList[articleId];
      container.innerHTML = `
        <div class="article-detail">
          <h1 class="article-title">${item.title}</h1>
          <img src="${item.img}" class="article-img" alt="文章图片">
          <div class="article-content">${item.content}</div>
        </div>
      `;
    } else {
      container.innerHTML = '<div class="empty-detail">文章不存在或已删除～</div>';
    }
  </script>
</body>
</html>
