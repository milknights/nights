<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情</title>
    <style>
        body {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
        }
        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #4285f4;
            text-decoration: none;
        }
        h1 {
            color: #333;
        }
        .content {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">← 返回首页</a>
    <div id="detail"></div>

    <script>
        // 获取 URL 中的博客 ID
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        // 读取本地存储的博客
        const blogs = JSON.parse(localStorage.getItem('blogs')) || [];
        const blog = blogs[id];

        if (blog) {
            document.getElementById('detail').innerHTML = `
                <h1>${blog.title}</h1>
                <img src="${blog.image}" alt="博客图片">
                <div class="content">${blog.content}</div>
            `;
        } else {
            document.getElementById('detail').innerHTML = '<h2>博客不存在</h2>';
        }
    </script>
</body>
</html>
