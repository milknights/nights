<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人博客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      /* 底部只预留折叠栏高度，彻底释放页面空间 */
      padding-bottom: 60px;
      color: #333;
    }

    /* 顶部博客头像+名称简介区域 */
    .blog-top {
      background: #ffffff;
      border-radius: 20px;
      padding: 30px;
      margin: 20px 0 40px;
      box-shadow: 0 4px 15px rgba(102, 113, 255, 0.08);
      text-align: center;
      position: relative;
    }

    /* 头像样式 - 圆形 */
    .avatar-box {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 15px;
      border: 3px solid #6671ff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .avatar-box:hover {
      transform: scale(1.05);
      border-color: #4f5bff;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-upload {
      display: none;
    }

    .change-avatar-tip {
      font-size: 12px;
      color: #6671ff;
      margin-bottom: 10px;
      cursor: pointer;
    }

    /* 博客名称与简介 */
    #blogName {
      font-size: 28px;
      font-weight: bold;
      color: #2d3748;
      border: none;
      background: transparent;
      outline: none;
      text-align: center;
      width: 80%;
      margin: 0 auto 8px;
      border-bottom: 2px dashed transparent;
      transition: border 0.3s;
    }

    #blogName:focus {
      border-color: #6671ff;
    }

    #blogDesc {
      font-size: 15px;
      color: #718096;
      border: none;
      background: transparent;
      outline: none;
      text-align: center;
      width: 90%;
      resize: none;
      border-bottom: 1px dashed transparent;
      transition: border 0.3s;
    }

    #blogDesc:focus {
      border-color: #e2e8f0;
    }

    /* 文章列表网格 */
    .blog-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    /* 博客卡片 - 正方形图片+精致样式 */
    .blog-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(102, 113, 255, 0.07);
      transition: all 0.3s ease;
    }

    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(102, 113, 255, 0.12);
    }

    /* 正方形图片容器 */
    .card-img-box {
      width: 100%;
      height: 270px;
      overflow: hidden;
    }

    .blog-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .blog-card:hover .blog-img {
      transform: scale(1.03);
    }

    .blog-info {
      padding: 18px;
    }

    .blog-title {
      font-size: 17px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 10px;
      cursor: pointer;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .blog-title:hover {
      color: #6671ff;
    }

    .blog-desc {
      font-size: 13px;
      color: #718096;
      line-height: 1.5;
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 操作按钮 */
    .btn-group {
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      padding: 6px 12px;
      transition: background 0.3s;
    }

    .btn-edit {
      background: #48bb78;
      color: #fff;
    }

    .btn-edit:hover {
      background: #38a169;
    }

    .btn-del {
      background: #f56565;
      color: #fff;
    }

    .btn-del:hover {
      background: #e53e3e;
    }

    /* 分页区域 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 30px 0;
    }

    .page-btn {
      background: #fff;
      color: #6671ff;
      border: 1px solid #e2e8f0;
      padding: 8px 14px;
      border-radius: 8px;
    }

    .page-btn:disabled {
      background: #f7fafc;
      color: #a0aec0;
      cursor: not-allowed;
      border-color: #e2e8f0;
    }

    .page-btn.active {
      background: #6671ff;
      color: #fff;
      border-color: #6671ff;
    }

    /* 底部固定发布编辑区域 - 彻底修复折叠展开 */
    .publish-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      box-shadow: 0 -4px 20px rgba(102, 113, 255, 0.1);
      z-index: 999;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      transition: all 0.3s ease;
    }

    /* 折叠状态：高度固定60px，彻底隐藏表单，无额外占位 */
    .publish-fold {
      height: 60px !important;
      overflow: hidden;
    }

    /* 展开状态：自适应高度，完整显示所有发布编辑内容 */
    .publish-unfold {
      height: auto;
    }

    .publish-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    /* 折叠开关栏：始终显示，点击切换折叠状态 */
    .fold-toggle-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
      padding: 0 10px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }

    .fold-toggle-bar h3 {
      color: #2d3748;
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .fold-icon {
      font-size: 16px;
      color: #6671ff;
      transition: transform 0.3s ease;
    }

    /* 展开时图标旋转180度，视觉更直观 */
    .fold-icon.rotate {
      transform: rotate(180deg);
    }

    /* 发布表单内容：折叠时完全隐藏，展开后正常显示 */
    .publish-content {
      padding: 20px 0 30px;
      display: none;
    }

    /* 展开时显示表单内容 */
    .publish-unfold .publish-content {
      display: block;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-item label {
      font-size: 14px;
      font-weight: 500;
      color: #4a5568;
    }

    input, textarea {
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      outline: none;
      transition: border 0.3s;
      font-size: 14px;
    }

    input:focus, textarea:focus {
      border-color: #6671ff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      grid-column: 1/-1;
    }

    /* 图片拖拽缩放区域 */
    .img-resize-box {
      resize: both;
      overflow: hidden;
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      width: 220px;
      height: 220px;
      padding: 5px;
      margin: 10px 0;
      cursor: se-resize;
    }

    .img-resize-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .file-upload {
      font-size: 13px;
    }

    .publish-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-save {
      background: #6671ff;
      color: #fff;
      padding: 10px 22px;
      font-size: 14px;
    }

    .btn-save:hover {
      background: #4f5bff;
    }

    .btn-cancel {
      background: #a0aec0;
      color: #fff;
    }

    .btn-cancel:hover {
      background: #718096;
    }

    /* 空数据提示 */
    .empty-tip {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .blog-top {
        padding: 20px;
      }
      .publish-inner {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部博客头像+名称简介 -->
  <div class="blog-top">
    <div class="avatar-box" onclick="document.getElementById('avatarUpload').click()">
      <img src="" class="avatar-img" id="avatarShow" alt="博客头像">
    </div>
    <p class="change-avatar-tip" onclick="document.getElementById('avatarUpload').click()">点击更换头像</p>
    <input type="file" id="avatarUpload" class="avatar-upload" accept="image/*" onchange="uploadAvatar(event)">
    <input type="text" id="blogName" placeholder="点击修改博客名称">
    <textarea id="blogDesc" rows="1" placeholder="点击修改博客简介"></textarea>
  </div>

  <!-- 博客文章列表 -->
  <div class="blog-list" id="blogList"></div>

  <!-- 分页控件 -->
  <div class="pagination" id="pagination"></div>

  <!-- 底部固定发布编辑栏 - 默认折叠，点击完整展开/收起 -->
  <div class="publish-footer publish-fold" id="publishPanel">
    <div class="publish-inner">
      <!-- 折叠开关栏：点击切换发布面板 -->
      <div class="fold-toggle-bar" onclick="togglePublishPanel()">
        <h3 id="formTitle">发布新文章</h3>
        <span class="fold-icon" id="foldIcon">▼</span>
      </div>
      <!-- 发布编辑表单：折叠时隐藏，展开时完整显示 -->
      <div class="publish-content">
        <div class="form-row">
          <div class="form-item">
            <label>文章标题</label>
            <input type="text" id="articleTitle" placeholder="请输入文章标题">
          </div>
          <div class="form-item">
            <label>上传图片（可拖动右下角缩放）</label>
            <div class="img-resize-box">
              <img id="imgPreview" style="display: none;">
            </div>
            <input type="file" id="imgUpload" class="file-upload" accept="image/*" onchange="previewArticleImg(event)">
          </div>
          <div class="form-item">
            <label>文章正文</label>
            <textarea id="articleContent" placeholder="请输入文章正文内容"></textarea>
          </div>
        </div>
        <div class="publish-btn-group">
          <button class="btn-save" onclick="saveArticle()">确认发布</button>
          <button class="btn-cancel" onclick="resetForm()">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 全局配置：分页每页显示6篇，博客基础信息
    const PAGE_SIZE = 6;
    let currentPage = 1;
    let editArticleId = null;

    // 加载博客配置（名称、简介、头像）
    let blogConfig = JSON.parse(localStorage.getItem('blogConfig')) || {
      blogName: '我的个人博客',
      blogDesc: '分享生活点滴，记录美好瞬间',
      avatar: ''
    };
    // 加载文章数据
    let articleList = JSON.parse(localStorage.getItem('articleList')) || [];

    // 初始化页面
    window.onload = function() {
      initBlogInfo();
      renderPage();
    };

    // 发布面板 折叠/展开 核心切换（彻底修复，控制显示+高度+图标）
    function togglePublishPanel() {
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      if (panel.classList.contains('publish-fold')) {
        // 点击展开：移除折叠类，添加展开类，图标旋转
        panel.classList.remove('publish-fold');
        panel.classList.add('publish-unfold');
        icon.classList.add('rotate');
      } else {
        // 点击折叠：移除展开类，添加折叠类，图标复位
        panel.classList.remove('publish-unfold');
        panel.classList.add('publish-fold');
        icon.classList.remove('rotate');
      }
    }

    // 初始化博客名称、简介、头像
    function initBlogInfo() {
      document.getElementById('blogName').value = blogConfig.blogName;
      document.getElementById('blogDesc').value = blogConfig.blogDesc;
      const avatarImg = document.getElementById('avatarShow');
      avatarImg.src = blogConfig.avatar || 'https://picsum.photos/100/100';
    }

    // 实时保存博客名称和简介
    document.getElementById('blogName').addEventListener('input', saveBlogInfo);
    document.getElementById('blogDesc').addEventListener('input', saveBlogInfo);
    function saveBlogInfo() {
      blogConfig.blogName = document.getElementById('blogName').value;
      blogConfig.blogDesc = document.getElementById('blogDesc').value;
      localStorage.setItem('blogConfig', JSON.stringify(blogConfig));
    }

    // 上传并更换博客头像
    function uploadAvatar(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(res) {
        blogConfig.avatar = res.target.result;
        document.getElementById('avatarShow').src = res.target.result;
        localStorage.setItem('blogConfig', JSON.stringify(blogConfig));
        alert('头像更换成功！');
      };
      reader.readAsDataURL(file);
    }

    // 文章图片预览
    function previewArticleImg(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(res) {
        const preview = document.getElementById('imgPreview');
        preview.src = res.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // 分页渲染文章列表
    function renderPage() {
      const listEl = document.getElementById('blogList');
      const totalPage = Math.ceil(articleList.length / PAGE_SIZE);
      // 截取当前页数据
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const currentList = articleList.slice(start, end);

      // 渲染文章
      if (currentList.length === 0) {
        listEl.innerHTML = '<div class="empty-tip">暂无文章，快去发布第一篇吧～</div>';
      } else {
        listEl.innerHTML = currentList.map((item, index) => {
          const realId = start + index;
          return `
          <div class="blog-card">
            <div class="card-img-box" onclick="goDetail(${realId})">
              <img src="${item.img}" class="blog-img" alt="文章图片">
            </div>
            <div class="blog-info">
              <div class="blog-title" onclick="goDetail(${realId})">${item.title}</div>
              <div class="blog-desc">${item.content.substring(0, 60)}...</div>
              <div class="btn-group">
                <button class="btn-edit" onclick="editArticle(${realId})">编辑</button>
                <button class="btn-del" onclick="delArticle(${realId})">删除</button>
              </div>
            </div>
          </div>
          `;
        }).join('');
      }

      // 渲染分页按钮
      renderPagination(totalPage);
    }

    // 渲染分页控件
    function renderPagination(totalPage) {
      const pageEl = document.getElementById('pagination');
      if (totalPage <= 1) {
        pageEl.innerHTML = '';
        return;
      }
      let pageHtml = `
        <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
      `;
      for (let i = 1; i <= totalPage; i++) {
        pageHtml += `
          <button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>
        `;
      }
      pageHtml += `
        <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPage ? 'disabled' : ''}>下一页</button>
      `;
      pageEl.innerHTML = pageHtml;
    }

    // 切换页码
    function changePage(page) {
      if (page < 1) return;
      currentPage = page;
      renderPage();
    }

    // 跳转文章详情页
    function goDetail(id) {
      location.href = `detail.html?id=${id}`;
    }

    // 编辑文章：自动展开发布面板，方便编辑
    function editArticle(id) {
      editArticleId = id;
      const item = articleList[id];
      document.getElementById('articleTitle').value = item.title;
      document.getElementById('articleContent').value = item.content;
      const preview = document.getElementById('imgPreview');
      preview.src = item.img;
      preview.style.display = 'block';
      document.getElementById('formTitle').innerText = '编辑文章';
      // 自动展开编辑面板
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      panel.classList.remove('publish-fold');
      panel.classList.add('publish-unfold');
      icon.classList.add('rotate');
    }

    // 删除文章
    function delArticle(id) {
      if (!confirm('确定删除这篇文章吗？删除后无法恢复哦！')) return;
      articleList.splice(id, 1);
      localStorage.setItem('articleList', JSON.stringify(articleList));
      // 删除后重新渲染，避免页码错乱
      currentPage = 1;
      renderPage();
      alert('文章删除成功！');
    }

    // 保存/发布文章
    function saveArticle() {
      const title = document.getElementById('articleTitle').value.trim();
      const content = document.getElementById('articleContent').value.trim();
      const img = document.getElementById('imgPreview');
      const imgSrc = img.src;

      if (!title || !content) {
        alert('标题和正文都不能为空哦～');
        return;
      }

      const articleData = {
        title: title,
        content: content,
        img: imgSrc
      };

      // 编辑模式
      if (editArticleId !== null) {
        articleList[editArticleId] = articleData;
        localStorage.setItem('articleList', JSON.stringify(articleList));
        alert('文章编辑成功！');
      } else {
        // 新增模式
        if (!imgSrc || img.style.display === 'none') {
          alert('请上传文章图片～');
          return;
        }
        articleList.unshift(articleData);
        localStorage.setItem('articleList', JSON.stringify(articleList));
        alert('文章发布成功！');
      }

      // 重置表单并刷新页面
      resetForm();
      currentPage = 1;
      renderPage();
    }

    // 重置发布编辑表单：重置后自动折叠面板
    function resetForm() {
      editArticleId = null;
      document.getElementById('articleTitle').value = '';
      document.getElementById('articleContent').value = '';
      document.getElementById('imgUpload').value = '';
      const preview = document.getElementById('imgPreview');
      preview.src = '';
      preview.style.display = 'none';
      document.getElementById('formTitle').innerText = '发布新文章';
      // 表单重置后自动折叠面板
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      panel.classList.remove('publish-unfold');
      panel.classList.add('publish-fold');
      icon.classList.remove('rotate');
    }
  </script>
</body>
</html>
