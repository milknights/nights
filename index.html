<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人博客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 60px;
      color: #333;
    }

    .blog-top {
      background: #ffffff;
      border-radius: 20px;
      padding: 30px;
      margin: 20px 0 40px;
      box-shadow: 0 4px 15px rgba(102, 113, 255, 0.08);
      text-align: center;
      position: relative;
    }

    .avatar-box {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 15px;
      border: 3px solid #6671ff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .avatar-box:hover {
      transform: scale(1.05);
      border-color: #4f5bff;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-upload { display: none; }
    .change-avatar-tip { font-size: 12px; color: #6671ff; margin-bottom: 10px; cursor: pointer; }

    #blogName {
      font-size: 28px; font-weight: bold; color: #2d3748; border: none; background: transparent;
      outline: none; text-align: center; width: 80%; margin: 0 auto 8px;
      border-bottom: 2px dashed transparent; transition: border 0.3s;
    }
    #blogName:focus { border-color: #6671ff; }

    #blogDesc {
      font-size: 15px; color: #718096; border: none; background: transparent;
      outline: none; text-align: center; width: 90%; resize: none;
      border-bottom: 1px dashed transparent; transition: border 0.3s;
    }
    #blogDesc:focus { border-color: #e2e8f0; }

    .home-layout {
      display: flex; gap: 30px; align-items: flex-start;
      margin-bottom: 40px; width: 100%;
    }

    .blog-list-sidebar {
      width: 50%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
    }

    .blog-preview {
      width: 50%;
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 3px 12px rgba(102, 113, 255, 0.07);
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      border: 1px dashed #cbd5e0;
    }
    .blog-preview.empty { display: none; }

    .preview-img-box {
      width: 100%;
      max-width: 400px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
      border-radius: 12px;
      overflow: hidden;
    }
    .preview-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .blog-thumb-item {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 10px rgba(102, 113, 255, 0.06);
      transition: all 0.3s ease; cursor: pointer;
    }
    .blog-thumb-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 8px;
    }
    .blog-thumb-item:hover {
      transform: translateY(-3px); box-shadow: 0 6px 15px rgba(102, 113, 255, 0.1);
    }
    .blog-thumb-title {
      padding: 15px; font-size: 16px; font-weight: 600;
      color: #2d3748; text-align: center; line-height: 1.4;
    }

    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; margin: 30px 0;
    }
    .page-btn {
      background: #fff; color: #6671ff; border: 1px solid #e2e8f0;
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
    }
    .page-btn:disabled {
      background: #f7fafc; color: #a0aec0; cursor: not-allowed; border-color: #e2e8f0;
    }
    .page-btn.active { background: #6671ff; color: #fff; border-color: #6671ff; }

    .publish-footer {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
      box-shadow: 0 -4px 20px rgba(102, 113, 255, 0.1);
      z-index: 999; border-top-left-radius: 20px; border-top-right-radius: 20px;
      transition: all 0.3s ease;
    }
    .publish-fold { height: 60px !important; overflow: hidden; }
    .publish-unfold { height: auto; }
    .publish-inner { max-width: 1200px; margin: 0 auto; padding: 0 30px; }

    .fold-toggle-bar {
      display: flex; justify-content: space-between; align-items: center;
      height: 60px; padding: 0 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
    }
    .fold-toggle-bar h3 { color: #2d3748; font-size: 18px; font-weight: 600; margin: 0; }
    .fold-icon { font-size: 16px; color: #6671ff; transition: transform 0.3s; }
    .fold-icon.rotate { transform: rotate(180deg); }

    .publish-content { padding: 20px 0 30px; display: none; }
    .publish-unfold .publish-content { display: block; }

    .editor-toolbar {
      display: flex; gap: 10px; margin-bottom: 15px; padding: 10px;
      background: #f8f9ff; border-radius: 8px; flex-wrap: wrap;
    }
    .editor-toolbar button {
      padding: 6px 12px; border: 1px solid #e2e8f0; background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s;
    }
    .editor-toolbar button:hover { background: #6671ff; color: #fff; border-color: #6671ff; }
    #colorPicker { width: 40px; height: 32px; border: none; cursor: pointer; }

    .form-row { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
    .form-item { display: flex; flex-direction: column; gap: 6px; min-width: 250px; }
    .form-item label { font-size: 14px; font-weight: 500; color: #4a5568; }

    input, textarea {
      padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
      outline: none; transition: border 0.3s; font-size: 14px;
    }
    input:focus, textarea:focus { border-color: #6671ff; }

    #articleEditor {
      min-height: 180px; padding: 15px; border: 1px solid #e2e8f0;
      border-radius: 8px; outline: none; line-height: 1.6;
    }

    /* 图片上传区域同行显示 */
    .img-upload-group {
      display: flex;
      flex-direction: row;
      gap: 30px;
      align-items: flex-start;
      flex-wrap: nowrap;
      margin-top: 10px;
    }

    /* 封面图：固定正方形 */
    .crop-wrapper-cover {
      position: relative;
      width: 220px;
      height: 220px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8f9ff;
      overflow: hidden;
    }

    /* 正文图：任意比例，可调节大小 */
    .crop-wrapper-content {
      position: relative;
      width: 320px;
      height: 220px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8f9ff;
      overflow: hidden;
      resize: both;
    }

    .crop-img {
      position: absolute;
      left: 0; top: 0;
      transform-origin: center center;
      cursor: move;
      max-width: none;
    }
    .crop-frame {
      position: absolute; left: 10px; top: 10px;
      width: calc(100% - 20px); height: calc(100% - 20px);
      border: 2px solid #6671ff;
      border-radius: 8px;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.15);
      pointer-events: none;
    }
    .crop-controls {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .crop-btn {
      padding: 6px 10px; background: #6671ff; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 12px;
    }
    .crop-tip {
      font-size: 12px; color: #718096; margin-top: 5px; line-height: 1.4;
    }
    .file-upload { font-size: 13px; margin-top: 6px; }

    .publish-btn-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn-save {
      background: #6671ff; color: #fff; padding: 10px 22px;
      font-size: 14px; border: none; border-radius: 8px; cursor: pointer;
    }
    .btn-save:hover { background: #4f5bff; }
    .btn-cancel {
      background: #a0aec0; color: #fff; padding: 10px 22px;
      font-size: 14px; border: none; border-radius: 8px; cursor: pointer;
    }
    .btn-cancel:hover { background: #718096; }

    .empty-tip {
      text-align: center; padding: 60px 20px;
      color: #a0aec0; font-size: 15px; grid-column: 1 / 3;
    }

    @media (max-width: 768px) {
      .home-layout { flex-direction: column; }
      .blog-list-sidebar, .blog-preview { width: 100%; }
      .blog-list-sidebar { grid-template-columns: 1fr; }
      .img-upload-group { flex-direction: column; gap: 20px; }
    }
  </style>
</head>
<body>
  <div class="blog-top">
    <div class="avatar-box" onclick="document.getElementById('avatarUpload').click()">
      <img src="" class="avatar-img" id="avatarShow">
    </div>
    <p class="change-avatar-tip" onclick="document.getElementById('avatarUpload').click()">点击更换头像</p>
    <input type="file" id="avatarUpload" class="avatar-upload" accept="image/*" onchange="uploadAvatar(event)">
    <input type="text" id="blogName" placeholder="点击修改博客名称">
    <textarea id="blogDesc" rows="1" placeholder="点击修改博客简介"></textarea>
  </div>

  <div class="home-layout">
    <div class="blog-list-sidebar" id="blogThumbList"></div>
    <div class="blog-preview" id="previewWrapper">
      <div class="preview-img-box">
        <img src="" id="previewMainImg">
      </div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

  <div class="publish-footer publish-fold" id="publishPanel">
    <div class="publish-inner">
      <div class="fold-toggle-bar" onclick="togglePublishPanel()">
        <h3 id="formTitle">发布新文章</h3>
        <span class="fold-icon" id="foldIcon">▼</span>
      </div>
      <div class="publish-content">
        <div class="form-row">
          <div class="form-item">
            <label>文章标题</label>
            <input type="text" id="articleTitle" placeholder="请输入文章标题">
          </div>

          <div class="img-upload-group">
            <!-- 封面图：正方形 -->
            <div class="form-item">
              <label>上传封面图（正方形）</label>
              <div class="crop-wrapper-cover" id="coverCropWrap">
                <img class="crop-img" id="coverCropImg" style="display:none">
                <div class="crop-frame"></div>
              </div>
              <div class="crop-controls">
                <button class="crop-btn" onclick="zoomImg('cover', 1.1)">放大 +</button>
                <button class="crop-btn" onclick="zoomImg('cover', 0.9)">缩小 -</button>
                <button class="crop-btn" onclick="smartCrop('cover')">智能裁剪</button>
              </div>
              <p class="crop-tip">拖动定位 + 滚轮缩放</p>
              <input type="file" id="coverUpload" class="file-upload" accept="image/*" onchange="loadCropImage(event, 'cover')">
            </div>

            <!-- 正文图：任意比例可调节 -->
            <div class="form-item">
              <label>上传正文图（任意比例可调节）</label>
              <div class="crop-wrapper-content" id="contentCropWrap">
                <img class="crop-img" id="contentCropImg" style="display:none">
                <div class="crop-frame"></div>
              </div>
              <div class="crop-controls">
                <button class="crop-btn" onclick="zoomImg('content', 1.1)">放大 +</button>
                <button class="crop-btn" onclick="zoomImg('content', 0.9)">缩小 -</button>
                <button class="crop-btn" onclick="smartCrop('content')">智能裁剪</button>
              </div>
              <p class="crop-tip">拖动定位 + 滚轮缩放 + 右下角调节大小</p>
              <input type="file" id="contentUpload" class="file-upload" accept="image/*" onchange="loadCropImage(event, 'content')">
            </div>
          </div>

          <div class="form-item">
            <label>文章内容（可编辑样式）</label>
            <div class="editor-toolbar">
              <button onclick="execCmd('bold')">粗体</button>
              <button onclick="execCmd('underline')">下划线</button>
              <button onclick="setTextColor()">字体颜色</button>
              <input type="color" id="colorPicker" value="#333333">
            </div>
            <div id="articleEditor" contenteditable="true" placeholder="请输入文章内容"></div>
          </div>
        </div>

        <div class="publish-btn-group">
          <button class="btn-save" onclick="saveArticle()">确认发布</button>
          <button class="btn-cancel" onclick="resetForm()">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 6;
    let currentPage = 1;
    let editArticleId = null;

    let cover = { scale: 1, x: 0, y: 0, dragging: false };
    let content = { scale: 1, x: 0, y: 0, dragging: false };

    let blogConfig = JSON.parse(localStorage.getItem('blogConfig')) || {
      blogName: '我的个人博客', blogDesc: '分享生活点滴', avatar: ''
    };
    let articleList = JSON.parse(localStorage.getItem('articleList')) || [];

    window.onload = function () {
      initBlogInfo();
      const editId = new URLSearchParams(location.search).get('edit');
      if (editId && articleList[editId]) {
        editArticleId = editId;
        editArticle(editId);
      }
      renderPage();
    };

    function togglePublishPanel() {
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      panel.classList.toggle('publish-fold');
      panel.classList.toggle('publish-unfold');
      icon.classList.toggle('rotate');
    }

    function execCmd(cmd) {
      document.execCommand(cmd, false, null);
      document.getElementById('articleEditor').focus();
    }
    function setTextColor() {
      const c = document.getElementById('colorPicker').value;
      document.execCommand('foreColor', false, c);
      document.getElementById('articleEditor').focus();
    }

    function initBlogInfo() {
      document.getElementById('blogName').value = blogConfig.blogName;
      document.getElementById('blogDesc').value = blogConfig.blogDesc;
      document.getElementById('avatarShow').src = blogConfig.avatar || 'https://picsum.photos/100/100';
    }

    document.getElementById('blogName').addEventListener('input', saveBlogInfo);
    document.getElementById('blogDesc').addEventListener('input', saveBlogInfo);
    function saveBlogInfo() {
      blogConfig.blogName = document.getElementById('blogName').value;
      blogConfig.blogDesc = document.getElementById('blogDesc').value;
      localStorage.setItem('blogConfig', JSON.stringify(blogConfig));
    }

    function uploadAvatar(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = (res) => {
        blogConfig.avatar = res.target.result;
        document.getElementById('avatarShow').src = res.target.result;
        localStorage.setItem('blogConfig', JSON.stringify(blogConfig));
        alert('头像更新成功');
      };
      r.readAsDataURL(f);
    }

    // ========== 图片裁剪核心 ==========
    function loadCropImage(e, type) {
      const file = e.target.files[0];
      if (!file) return;
      const img = document.getElementById(type + 'CropImg');
      const r = new FileReader();
      r.onload = () => {
        img.src = r.result;
        img.style.display = 'block';
        resetCrop(type);
        bindDrag(type);
        bindWheel(type);
      };
      r.readAsDataURL(file);
    }

    function resetCrop(type) {
      const t = type === 'cover' ? cover : content;
      t.scale = 1; t.x = 0; t.y = 0;
      updateCrop(type);
    }

    function updateCrop(type) {
      const t = type === 'cover' ? cover : content;
      const img = document.getElementById(type + 'CropImg');
      img.style.transform = `translate(${t.x}px, ${t.y}px) scale(${t.scale})`;
    }

    function bindDrag(type) {
      const img = document.getElementById(type + 'CropImg');
      const t = type === 'cover' ? cover : content;
      let startX, startY;

      img.onmousedown = (e) => {
        t.dragging = true;
        startX = e.clientX - t.x;
        startY = e.clientY - t.y;
        e.preventDefault();
      };
      document.onmousemove = (e) => {
        if (!t.dragging) return;
        t.x = e.clientX - startX;
        t.y = e.clientY - startY;
        updateCrop(type);
      };
      document.onmouseup = () => t.dragging = false;
    }

    function bindWheel(type) {
      const wrap = document.getElementById(type + 'CropWrap');
      wrap.onwheel = (e) => {
        e.preventDefault();
        const t = type === 'cover' ? cover : content;
        t.scale *= e.deltaY < 0 ? 1.1 : 0.9;
        t.scale = Math.max(0.5, Math.min(t.scale, 3));
        updateCrop(type);
      };
    }

    function zoomImg(type, factor) {
      const t = type === 'cover' ? cover : content;
      t.scale *= factor;
      t.scale = Math.max(0.5, Math.min(t.scale, 3));
      updateCrop(type);
    }

    function smartCrop(type) {
      resetCrop(type);
    }

    // ========== 页面渲染 ==========
    function renderPage() {
      const listEl = document.getElementById('blogThumbList');
      const previewWrapper = document.getElementById('previewWrapper');
      const total = Math.ceil(articleList.length / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const items = articleList.slice(start, start + PAGE_SIZE);

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-tip">暂无文章，快去发布第一篇吧～</div>';
        previewWrapper.classList.add('empty');
        renderPagination(total);
        return;
      }

      previewWrapper.classList.remove('empty');
      document.getElementById('previewMainImg').src = items[0].cover;

      listEl.innerHTML = items.map((it, idx) => {
        const id = start + idx;
        return `
        <div class="blog-thumb-item" onmouseover="switchPreview(${id})" onclick="goDetail(${id})">
          <img src="${it.cover}" class="blog-thumb-img">
          <div class="blog-thumb-title">${it.title}</div>
        </div>`;
      }).join('');
      renderPagination(total);
    }

    function switchPreview(id) {
      if (articleList[id]) document.getElementById('previewMainImg').src = articleList[id].cover;
    }

    function renderPagination(total) {
      const el = document.getElementById('pagination');
      if (total <= 1) { el.innerHTML = ''; return; }
      let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      for (let i = 1; i <= total; i++) {
        html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}>下一页</button>`;
      el.innerHTML = html;
    }

    function changePage(p) {
      if (p < 1 || p > Math.ceil(articleList.length / PAGE_SIZE)) return;
      currentPage = p; renderPage();
    }

    function goDetail(id) { location.href = `detail.html?id=${id}`; }

    // ========== 编辑文章 ==========
    function editArticle(id) {
      const item = articleList[id];
      document.getElementById('articleTitle').value = item.title;
      document.getElementById('articleEditor').innerHTML = item.content;

      if (item.cover) {
        const img = document.getElementById('coverCropImg');
        img.src = item.cover;
        img.style.display = 'block';
        resetCrop('cover');
      }
      if (item.contentImg) {
        const img = document.getElementById('contentCropImg');
        img.src = item.contentImg;
        img.style.display = 'block';
        resetCrop('content');
      }

      document.getElementById('formTitle').innerText = '编辑文章';
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      panel.classList.remove('publish-fold');
      panel.classList.add('publish-unfold');
      icon.classList.add('rotate');
    }

    // ========== ✅ 发布功能已修复 ==========
    function saveArticle() {
      const title = document.getElementById('articleTitle').value.trim();
      const content = document.getElementById('articleEditor').innerHTML.trim();
      const coverImg = document.getElementById('coverCropImg');
      const contentImg = document.getElementById('contentCropImg');

      const coverSrc = coverImg.src || '';
      const contentSrc = contentImg.src || '';

      if (!title) {
        alert('请输入文章标题！');
        return;
      }
      if (!content) {
        alert('请输入文章内容！');
        return;
      }
      if (!coverSrc || coverSrc === '') {
        alert('请上传封面图！');
        return;
      }

      const data = {
        title, content, cover: coverSrc, contentImg: contentSrc
      };

      if (editArticleId != null) {
        articleList[editArticleId] = data;
      } else {
        articleList.unshift(data);
      }

      localStorage.setItem('articleList', JSON.stringify(articleList));
      alert(editArticleId != null ? '编辑成功！' : '发布成功！');
      resetForm();
      currentPage = 1;
      renderPage();
    }

    function resetForm() {
      editArticleId = null;
      document.getElementById('articleTitle').value = '';
      document.getElementById('articleEditor').innerHTML = '';
      document.getElementById('coverUpload').value = '';
      document.getElementById('contentUpload').value = '';
      document.getElementById('coverCropImg').style.display = 'none';
      document.getElementById('contentCropImg').style.display = 'none';
      document.getElementById('formTitle').innerText = '发布新文章';
      const panel = document.getElementById('publishPanel');
      const icon = document.getElementById('foldIcon');
      panel.classList.add('publish-fold');
      panel.classList.remove('publish-unfold');
      icon.classList.remove('rotate');
    }
  </script>
</body>
</html>
